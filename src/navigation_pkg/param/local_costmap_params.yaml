# 命名空间
local_costmap:
  global_frame: odom                # 里程计坐标系 
  robot_base_frame: base_footprint  # 机器人坐标系

  update_frequency: 10.0            # 代价地图更新频率。因为他要实时更新的，因此频率高
  publish_frequency: 10.0           # 代价地图的发布频率
  
  inflation_radius: 0.05            # 膨胀半径
  transform_tolerance: 1            # 这整个tf坐标系的时间戳容忍时间，一般为1s即可.  # laser --> base_footprint --> odom

  static_map: false                 # 不需要静态地图，可以提升导航效果
  rolling_window: true              # 是否使用动态窗口，默认为false，在静态的全局地图中，地图不会变化
   
                                    # 下面两个设置的是局部地图大小，他设置的值是直径。他是以半径机器人为中心向各边展开的
  width: 3                          # 局部地图宽度 单位是 m。向前后左右展开1.5m，形成一个框着机器人的四边形
  height: 3                         # 局部地图高度 单位是 m。向上下展开1.5m
  resolution: 0.05                  # 局部地图分辨率 单位是 m，一般与静态地图分辨率保持一致
