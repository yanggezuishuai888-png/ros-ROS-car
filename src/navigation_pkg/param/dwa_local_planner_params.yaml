DWAPlannerROS: 
  odom_topic: /odometry/filtered # 让dwa使用融合后的odom话题
  # ============================== 
  # 1.速度参数，需根据机器人真实性能设置
  # ============================== 
  max_vel_x: 1                   # 0.55 x方向最大线速度绝对值，单位:米/秒
  min_vel_x: 0.2                 # x方向最小线速度绝对值，单位:米/秒。如果为负值表示可以后退.大于或等于0，则不能
  max_vel_y: 0.0                 # y方向最大线速度绝对值，单位:米/秒。turtlebot为差分驱动机器人，所以为0
  min_vel_y: 0.0                 # y方向最小线速度绝对值，单位:米/秒。turtlebot为差分驱动机器人，所以为0
  max_vel_trans: 1               # 最大平移速度，单位为 m/s。差速小车基本的速度一致
  min_vel_trans: 0.2             # 最小平移速度，单位为 m/s。差速小车基本的速度一致
  trans_stopped_vel: 0.01        # 当平移速度小于这个值，就让判断速度为0。这是减少抖动，因为实际机器人不可能速度为0
  
  acc_lim_trans: 18              # 最大平移加速度和下面这个类似，所以一般要一样，不然不生效
  acc_lim_x: 18                  # x方向的加速度上限，单位为 m/s平方。公式：Δv_max = acc_lim_x * Δt（controller_frequency频率对应的时间 如：5 -> 1/5 = 0.2s） 
  acc_lim_y: 0.0                 # y方向加速度上限
  acc_lim_theta: 18              # 角加速度上限

  max_vel_theta: 1               # 最大旋转角速度，单位为 rad/s 
  min_vel_theta: 0.2             # 机器人的最小旋转角速度的绝对值，单位为 rad/s
  theta_stopped_vel: 0.03        # 当旋转速度小于这个值，就认为机器人停止

  # ============================== 
  # 2.目标距离公差参数
  # ============================== 
  # 说明：机器人移动到目标点时位置和方向是有偏差的。下面两个设置的就是允许误差
  yaw_goal_tolerance: 0.5         # 0.05 角度方向上的误差（单位：弧度）
  xy_goal_tolerance: 0.5          # 0.10 位置方向上的误差（单位：米）
  latch_xy_goal_tolerance: true   # 设置为true时表示：如果到达容错距离内,机器人就会原地旋转；即使转动是会跑出容错距离外。


  # ============================== 
  # 3.前向模拟参数
  # ============================== 
  sim_time: 2                     # 1.7 前向模拟轨迹的时间，单位为s(seconds) 
  vx_samples: 20                  # 3   x方向速度空间的采样点数.
  vy_samples: 1                   #     y方向速度空间采样点数。Tutulebot为差分驱动机器人，所以y方向永远只有1个值（0.0）
  vtheta_samples: 30              # 20 旋转方向的速度空间采样点数.


  # ============================== 
  # 4.轨迹评分参数。
  # ============================== 
  # 说明：
  # 影响着最终选择哪一条路线。如果想让某个因素优先级提升，就增大对应权重
  path_distance_bias: 60.0        # 32.0  局部轨迹贴和全局轨迹权重
  goal_distance_bias: 24.0        # 24.0  局部轨迹终点和全局路径在局部地图的最远点的距离权重
  occdist_scale: 0.1              # 0.01   局部轨迹和障碍物的最近距离权重
  forward_point_distance: 0.325   # 0.325 以机器人为中心，额外放置一个计分点的距离
  stop_time_buffer: 0.2           # 0.2   机器人在碰撞发生前必须拥有的最少时间量。该时间内所采用的轨迹仍视为有效。即：为防止碰撞,机器人必须提前停止的时间长度
  scaling_speed: 0.25             # 0.25  开始缩放机器人足迹时的速度的绝对值，单位为m/s。启动机器人底盘的速度是否重要
  max_scaling_factor: 0.2         # 0.2   机器人加速在高速时能缩放的最大系数。


  # ============================== 
  # 5.振荡预防参数
  # ============================== 
  oscillation_reset_dist: 1.05    # 0.05  机器人必须运动多少米远后才能复位震荡标记(机器人运动多远距离才会重置振荡标记)


  # ============================== 
  # 6.辅助调试参数
  # ============================== 
  publish_traj_pc : true          # 将规划的轨迹在RVIZ上进行可视化
  publish_cost_grid_pc: true      # 是否将代价网络在rviz中可视化显示（true为是）如果设置为true,那么就会在~/cost_cloud话题上发布sensor_msgs/PointCloud2类型消息.
  global_frame_id: odom           # 设置局部路径参考的坐标系。一般为odom


  # ============================== 
  # 7.差分机器人配置参数
  # ============================== 
  holonomic_robot: false          # 是否为全向驱动，false为否（差分驱动）
  prune_plan: false               # 全局计划参数 机器人前进是否清除身后1m外的轨迹.
