footprint: [                # 机器人几何参（大小），如果机器人是圆形，直接设置robot_radius。如果是其他形状设置 footprint。即设置设置几何点坐标
#   [-0.12,  -0.1025],
#   [-0.12,   0.1025],
#   [ 0.12,   0.1025],
#   [ 0.12,  -0.1025]
# ]

  [-0.14,  -0.1225],
  [-0.14,   0.1225],
  [ 0.14,   0.1225],
  [ 0.14,  -0.1225]
]
obstacle_range: 5.0         # 用于障碍物探测，比如: 值为 3.0，意味着检测到距离小于 3 米的障碍物时，就会引入代价地图
raytrace_range: 5.5         # 用于清除障碍物，比如：值为 3.5，意味着清除代价地图中 3.5 米以外的障碍物
cost_scaling_factor: 10.0   # 代价比例系数，决定从障碍物边缘往外衰减的速度。相同距离，值越大，衰减越快，外围代价越小。 取值范围1-50.一般取1 - 10
map_type: costmap           # 导航过程中所使用的地图类型。costmap ---- 代价地图
observation_sources: scan   # 自定义的传感器名称
scan: {
  data_type: LaserScan,     # 消息类型
  sensor_frame: laser,      # 坐标
  topic: scan,              # 话题
  marking: true,            # 是否用于探测障碍物添加（true为是）
  clearing: true            # 是否用于障碍物删除（true为是）
  }